name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile app/main.py

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: 添加服务器到 known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 写入 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 部署到服务器（curl/wget 下载 tarball，避免 git 网络卡死）
        env:
          QIANFAN_KEY: ${{ secrets.QIANFAN_API_KEY }}
          QIANFAN_PLUGIN_ID: ${{ secrets.QIANFAN_PLUGIN_ID }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -o SendEnv=QIANFAN_KEY -o SendEnv=QIANFAN_PLUGIN_ID \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} '
            echo "=== 开始部署 ==="
            TEMP_DIR=/root/ai-chat-assistant-temp
            TARBALL=/root/ai-chat-assistant-tarball.tar.gz
            OLD_DIR=/root/ai-chat-assistant-old
            TARGET_DIR=/root/ai-chat-assistant

            # 下载 tarball（用 curl 或 wget，走 HTTPS 443 端口）
            rm -f "$TARBALL"
            DOWNLOAD_URL="https://github.com/zhu-app/ai-chat-assistant/archive/master.tar.gz"
            echo "Downloading from $DOWNLOAD_URL ..."

            if command -v curl >/dev/null 2>&1; then
              curl -sL --connect-timeout 15 --max-time 90 -o "$TARBALL" "$DOWNLOAD_URL" && echo "curl OK" || echo "curl failed"
            fi
            if [ ! -f "$TARBALL" ] || [ ! -s "$TARBALL" ]; then
              if command -v wget >/dev/null 2>&1; then
                wget -q --timeout=90 -O "$TARBALL" "$DOWNLOAD_URL" && echo "wget OK" || echo "wget failed"
              fi
            fi
            if [ ! -f "$TARBALL" ] || [ ! -s "$TARBALL" ]; then
              echo "ERROR: Failed to download tarball" >&2
              exit 1
            fi

            # 解压
            rm -rf "$TEMP_DIR"
            mkdir -p "$TEMP_DIR"
            tar -xzf "$TARBALL" -C "$TEMP_DIR" --strip-components=1 || {
              echo "ERROR: tar extraction failed" >&2; exit 1
            }
            rm -f "$TARBALL"
            echo "Extracted OK"

            # 保留数据
            cp "$TARGET_DIR/backend/data" "$TEMP_DIR/backend/" -r 2>/dev/null || true
            cp "$TARGET_DIR/backend/.env.production" "$TEMP_DIR/backend/" 2>/dev/null || true
            cp "$TARGET_DIR/backend/knowledge" "$TEMP_DIR/backend/" -r 2>/dev/null || true
            echo "Data preserved"

            # 写入搜索配置（通过 GitHub Secrets 注入）
            if [ -n "$QIANFAN_KEY" ]; then
              # 将千帆配置写入 .env.production
              printf '\n# 搜索后端配置（search_backend: duckduckgo | bing | qianfan）\n' >> "$TEMP_DIR/backend/.env.production"
              printf 'search_backend=qianfan\n' >> "$TEMP_DIR/backend/.env.production"
              printf 'qianfan_api_key=%s\n' "$QIANFAN_KEY" >> "$TEMP_DIR/backend/.env.production"
              printf 'qianfan_secret_key=\n' >> "$TEMP_DIR/backend/.env.production"
              printf 'qianfan_plugin_id=%s\n' "$QIANFAN_PLUGIN_ID" >> "$TEMP_DIR/backend/.env.production"
              echo "Search config written"
            fi

            # 交换目录
            rm -rf "$OLD_DIR"
            mv "$TARGET_DIR" "$OLD_DIR" 2>/dev/null || true
            mv "$TEMP_DIR" "$TARGET_DIR"
            echo "Directory swapped"

            # 构建重启
            cd "$TARGET_DIR"
            echo "Building and restarting..."
            docker compose up -d --build || echo "docker compose failed"
            docker image prune -f || true
            rm -rf "$OLD_DIR" 2>/dev/null || true
            echo "=== 部署完成 ==="
          '