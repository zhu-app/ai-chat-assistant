name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile app/main.py

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: 添加服务器到 known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 写入 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 部署到服务器（git clone 避免 fetch 卡死）
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} '
            set -e
            TEMP_DIR=/root/ai-chat-assistant-temp
            OLD_DIR=/root/ai-chat-assistant-old
            TARGET_DIR=/root/ai-chat-assistant

            # 用 git clone（带超时和 SSH 超时配置，避免连接卡死）
            rm -rf "$TEMP_DIR"
            export GIT_SSH_COMMAND="ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no"
            timeout 60 git clone --depth 1 git@github.com:zhu-app/ai-chat-assistant.git "$TEMP_DIR" || {
              echo "git clone via SSH failed, trying HTTPS..."
              rm -rf "$TEMP_DIR"
              timeout 60 git clone --depth 1 \
                https://github.com/zhu-app/ai-chat-assistant.git "$TEMP_DIR"
            }

            # 保留数据（数据库、文档、配置）
            cp "$TARGET_DIR/backend/data" "$TEMP_DIR/backend/" -r 2>/dev/null || true
            cp "$TARGET_DIR/backend/.env.production" "$TEMP_DIR/backend/" 2>/dev/null || true
            cp "$TARGET_DIR/backend/knowledge" "$TEMP_DIR/backend/" -r 2>/dev/null || true

            # 交换目录
            rm -rf "$OLD_DIR"
            mv "$TARGET_DIR" "$OLD_DIR" 2>/dev/null || true
            mv "$TEMP_DIR" "$TARGET_DIR"

            # 构建重启
            cd "$TARGET_DIR"
            docker compose up -d --build
            docker image prune -f
            rm -rf "$OLD_DIR" 2>/dev/null || true
          '