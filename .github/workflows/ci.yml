name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile app/main.py

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: 添加服务器到 known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 写入 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 生成 env 配置
        run: |
          echo "" > /tmp/env_config.txt
          echo "# 搜索后端配置（search_backend: duckduckgo | bing | qianfan）" >> /tmp/env_config.txt
          echo "search_backend=qianfan" >> /tmp/env_config.txt
          echo "qianfan_api_key=${{ secrets.QIANFAN_API_KEY }}" >> /tmp/env_config.txt
          echo "qianfan_secret_key=" >> /tmp/env_config.txt
          echo "qianfan_plugin_id=${{ secrets.QIANFAN_PLUGIN_ID }}" >> /tmp/env_config.txt

      - name: 上传配置和脚本到服务器并执行
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            /tmp/env_config.txt deploy.sh \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/tmp/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} 'bash /tmp/deploy.sh'