name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile app/main.py

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: 添加服务器到 known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 写入 SSH 密钥
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: 部署到服务器
        run: |
          # 用 echo 逐行生成部署脚本（避免 heredoc 的 YAML 缩进问题）
          rm -f /tmp/deploy.sh
          echo '#!/bin/bash' > /tmp/deploy.sh
          echo 'set -e' >> /tmp/deploy.sh
          echo 'echo "=== 开始部署 ==="' >> /tmp/deploy.sh
          echo 'TEMP_DIR=/root/ai-chat-assistant-temp' >> /tmp/deploy.sh
          echo 'TARBALL=/root/ai-chat-assistant-tarball.tar.gz' >> /tmp/deploy.sh
          echo 'OLD_DIR=/root/ai-chat-assistant-old' >> /tmp/deploy.sh
          echo 'TARGET_DIR=/root/ai-chat-assistant' >> /tmp/deploy.sh
          echo 'cd /root' >> /tmp/deploy.sh
          echo 'rm -f "$TARBALL"' >> /tmp/deploy.sh
          echo 'DOWNLOAD_URL="https://github.com/zhu-app/ai-chat-assistant/archive/master.tar.gz"' >> /tmp/deploy.sh
          echo 'echo "Downloading tarball..."' >> /tmp/deploy.sh
          echo 'if command -v curl >/dev/null 2>&1; then' >> /tmp/deploy.sh
          echo '  curl -sL --connect-timeout 15 --max-time 90 -o "$TARBALL" "$DOWNLOAD_URL" && echo "curl OK" || echo "curl failed"' >> /tmp/deploy.sh
          echo 'fi' >> /tmp/deploy.sh
          echo 'if [ ! -f "$TARBALL" ] || [ ! -s "$TARBALL" ]; then' >> /tmp/deploy.sh
          echo '  if command -v wget >/dev/null 2>&1; then' >> /tmp/deploy.sh
          echo '    wget -q --timeout=90 -O "$TARBALL" "$DOWNLOAD_URL" && echo "wget OK" || echo "wget failed"' >> /tmp/deploy.sh
          echo '  fi' >> /tmp/deploy.sh
          echo 'fi' >> /tmp/deploy.sh
          echo 'if [ ! -f "$TARBALL" ] || [ ! -s "$TARBALL" ]; then' >> /tmp/deploy.sh
          echo '  echo "ERROR: Failed to download tarball" >&2; exit 1' >> /tmp/deploy.sh
          echo 'fi' >> /tmp/deploy.sh
          echo 'rm -rf "$TEMP_DIR"' >> /tmp/deploy.sh
          echo 'mkdir -p "$TEMP_DIR"' >> /tmp/deploy.sh
          echo 'tar -xzf "$TARBALL" -C "$TEMP_DIR" --strip-components=1 || { echo "ERROR: tar extraction failed" >&2; exit 1; }' >> /tmp/deploy.sh
          echo 'rm -f "$TARBALL"' >> /tmp/deploy.sh
          echo 'echo "Extracted OK"' >> /tmp/deploy.sh
          echo 'cp "$TARGET_DIR/backend/data" "$TEMP_DIR/backend/" -r 2>/dev/null || true' >> /tmp/deploy.sh
          echo 'cp "$TARGET_DIR/backend/.env.production" "$TEMP_DIR/backend/" 2>/dev/null || true' >> /tmp/deploy.sh
          echo 'cp "$TARGET_DIR/backend/knowledge" "$TEMP_DIR/backend/" -r 2>/dev/null || true' >> /tmp/deploy.sh
          echo 'echo "Data preserved"' >> /tmp/deploy.sh
          echo 'echo "" >> "$TEMP_DIR/backend/.env.production"' >> /tmp/deploy.sh
          echo 'echo "search_backend=qianfan" >> "$TEMP_DIR/backend/.env.production"' >> /tmp/deploy.sh
          echo 'echo "qianfan_api_key=$1" >> "$TEMP_DIR/backend/.env.production"' >> /tmp/deploy.sh
          echo 'echo "qianfan_plugin_id=$2" >> "$TEMP_DIR/backend/.env.production"' >> /tmp/deploy.sh
          echo 'echo "Env config merged"' >> /tmp/deploy.sh
          echo 'rm -rf "$OLD_DIR"' >> /tmp/deploy.sh
          echo 'mv "$TARGET_DIR" "$OLD_DIR" 2>/dev/null || true' >> /tmp/deploy.sh
          echo 'mv "$TEMP_DIR" "$TARGET_DIR"' >> /tmp/deploy.sh
          echo 'echo "Directory swapped"' >> /tmp/deploy.sh
          echo 'cd "$TARGET_DIR"' >> /tmp/deploy.sh
          echo 'echo "Building and restarting..."' >> /tmp/deploy.sh
          echo 'docker compose up -d --build || echo "docker compose failed"' >> /tmp/deploy.sh
          echo 'docker image prune -f || true' >> /tmp/deploy.sh
          echo 'rm -rf "$OLD_DIR" 2>/dev/null || true' >> /tmp/deploy.sh
          echo 'echo "=== 部署完成 ==="' >> /tmp/deploy.sh

          # 将脚本和配置参数传给服务器执行
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            /tmp/deploy.sh \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/tmp/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \
            "bash /tmp/deploy.sh '${{ secrets.QIANFAN_API_KEY }}' '${{ secrets.QIANFAN_PLUGIN_ID }}'"